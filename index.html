<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Focus Flow - 番茄时钟</title>
<meta name="description" content="A simple bilingual Pomodoro timer / 简单双语番茄钟">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e74c3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus Flow">
<meta property="og:title" content="Focus Flow - Pomodoro Timer">
<meta property="og:description" content="Simple, beautiful Pomodoro timer in English & Chinese">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
<style>
:root {
  --pomodoro: #e74c3c;
  --pomodoro-glow: rgba(231, 76, 60, 0.45);
  --pomodoro-bg: #1a0e0e;
  --short: #f39c12;
  --short-glow: rgba(243, 156, 18, 0.45);
  --short-bg: #1a150a;
  --long: #3498db;
  --long-glow: rgba(52, 152, 219, 0.45);
  --long-bg: #0a1520;
  --bg: #0c0c14;
  --card: rgba(255, 255, 255, 0.04);
  --card-hover: rgba(255, 255, 255, 0.06);
  --card-solid: #16162a;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.06);
  --text: #f0f0f2;
  --text-secondary: #b0b0c0;
  --text-dim: #5a5a72;
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 24px;
  --radius-xl: 28px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --font-display: -apple-system, "SF Pro Display", "PingFang SC", "Inter", "Helvetica Neue", sans-serif;
  --font-mono: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background var(--transition-slow);
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(120, 80, 255, 0.08), transparent),
    radial-gradient(ellipse 60% 50% at 80% 110%, rgba(231, 76, 60, 0.06), transparent),
    radial-gradient(ellipse 50% 40% at 20% 100%, rgba(52, 152, 219, 0.05), transparent);
  pointer-events: none;
  z-index: 0;
}

body.pomodoro { background: var(--pomodoro-bg); }
body.pomodoro::before {
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(231, 76, 60, 0.12), transparent),
    radial-gradient(ellipse 60% 50% at 80% 110%, rgba(231, 76, 60, 0.06), transparent);
}
body.short-break { background: var(--short-bg); }
body.short-break::before {
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(243, 156, 18, 0.1), transparent),
    radial-gradient(ellipse 60% 50% at 20% 100%, rgba(243, 156, 18, 0.05), transparent);
}
body.long-break { background: var(--long-bg); }
body.long-break::before {
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(52, 152, 219, 0.12), transparent),
    radial-gradient(ellipse 60% 50% at 20% 100%, rgba(52, 152, 219, 0.06), transparent);
}

/* Container */
.container {
  width: 100%;
  max-width: 480px;
  padding: 16px 20px 80px;
  position: relative;
  z-index: 1;
}

/* Top bar */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  padding: 0 2px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text-secondary);
  transition: color var(--transition);
}

.logo .emoji {
  font-size: 20px;
  filter: saturate(0.8);
}

.top-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}

.icon-btn:hover {
  background: var(--card-hover);
  border-color: var(--border-hover);
  color: var(--text-secondary);
  transform: translateY(-1px);
}

.icon-btn:active {
  transform: translateY(0) scale(0.95);
}

/* Mode tabs */
.modes {
  display: flex;
  gap: 3px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 36px;
}

.mode-btn {
  flex: 1;
  padding: 11px 6px;
  border: none;
  border-radius: 11px;
  background: transparent;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  letter-spacing: 0.2px;
  position: relative;
}

.mode-btn::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%) scaleX(0);
  width: 16px;
  height: 2px;
  border-radius: 1px;
  background: currentColor;
  transition: transform var(--transition);
}

.mode-btn.active::after {
  transform: translateX(-50%) scaleX(1);
}

.mode-btn.active {
  background: rgba(255,255,255,0.06);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.mode-btn:active {
  transform: scale(0.97);
}

.mode-btn.pomodoro.active {
  color: var(--pomodoro);
  background: rgba(231, 76, 60, 0.1);
}

.mode-btn.short-break.active {
  color: var(--short);
  background: rgba(243, 156, 18, 0.1);
}

.mode-btn.long-break.active {
  color: var(--long);
  background: rgba(52, 152, 219, 0.1);
}

/* Timer — hero section */
.timer-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 36px;
}

.timer-ring {
  position: relative;
  width: 260px;
  height: 260px;
  margin-bottom: 28px;
}

.timer-ring::before {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--pomodoro-glow), transparent 70%);
  opacity: 0.3;
  transition: opacity var(--transition-slow);
  pointer-events: none;
}

body.running .timer-ring::before,
.timer-section:has(.start-btn.running) .timer-ring::before {
  opacity: 0.6;
  animation: pulse-glow 2s ease-in-out infinite;
}

body.short-break .timer-ring::before {
  background: radial-gradient(circle, var(--short-glow), transparent 70%);
}

body.long-break .timer-ring::before {
  background: radial-gradient(circle, var(--long-glow), transparent 70%);
}

@keyframes pulse-glow {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.03); }
}

.timer-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  filter: drop-shadow(0 0 8px var(--pomodoro-glow));
  transition: filter var(--transition-slow);
}

body.short-break .timer-ring svg {
  filter: drop-shadow(0 0 8px var(--short-glow));
}

body.long-break .timer-ring svg {
  filter: drop-shadow(0 0 8px var(--long-glow));
}

.timer-ring .track {
  fill: none;
  stroke: rgba(255,255,255,0.04);
  stroke-width: 5;
}

.timer-ring .progress {
  fill: none;
  stroke: var(--pomodoro);
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 848;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke var(--transition);
  filter: drop-shadow(0 0 6px var(--pomodoro-glow));
}

body.short-break .timer-ring .progress {
  stroke: var(--short);
  filter: drop-shadow(0 0 6px var(--short-glow));
}

body.long-break .timer-ring .progress {
  stroke: var(--long);
  filter: drop-shadow(0 0 6px var(--long-glow));
}

.timer-time {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 68px;
  font-weight: 200;
  letter-spacing: -3px;
  font-variant-numeric: tabular-nums;
  font-family: var(--font-display);
  color: var(--text);
  line-height: 1;
}

.timer-label {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 24px;
  letter-spacing: 0.3px;
  font-weight: 500;
  transition: color var(--transition);
}

/* Start/Pause/Reset */
.timer-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.start-btn {
  width: 192px;
  padding: 15px 0;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  color: white;
  letter-spacing: 3px;
  position: relative;
  overflow: hidden;
}

.start-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
  pointer-events: none;
  border-radius: 50px;
}

.start-btn.pomodoro {
  background: var(--pomodoro);
  box-shadow: 0 4px 24px var(--pomodoro-glow), inset 0 1px 0 rgba(255,255,255,0.15);
}

.start-btn.short-break {
  background: var(--short);
  box-shadow: 0 4px 24px var(--short-glow), inset 0 1px 0 rgba(255,255,255,0.15);
}

.start-btn.long-break {
  background: var(--long);
  box-shadow: 0 4px 24px var(--long-glow), inset 0 1px 0 rgba(255,255,255,0.15);
}

.start-btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.08);
}

.start-btn:active {
  transform: translateY(0) scale(0.98);
  filter: brightness(0.95);
}

.start-btn.running {
  opacity: 0.9;
}

.start-btn.running::before {
  background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 50%);
}

.reset-btn {
  width: 48px;
  height: 48px;
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}

.reset-btn:hover {
  border-color: var(--border-hover);
  color: var(--text-secondary);
  background: var(--card-hover);
  transform: rotate(-45deg);
}

.reset-btn:active {
  transform: rotate(-45deg) scale(0.92);
}

/* Task section */
.task-section {
  margin-bottom: 20px;
}

.task-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  padding: 0 2px;
}

.task-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: -0.2px;
}

.task-count {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
}

.task-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.task-input {
  flex: 1;
  padding: 13px 16px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-display);
  outline: none;
  transition: all var(--transition);
}

.task-input::placeholder {
  color: var(--text-dim);
}

.task-input:focus {
  border-color: var(--border-hover);
  background: rgba(255, 255, 255, 0.06);
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03);
}

.task-add-btn {
  width: 46px;
  height: 46px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-secondary);
  font-size: 22px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.task-add-btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--border-hover);
  color: var(--text);
  transform: scale(1.04);
}

.task-add-btn:active {
  transform: scale(0.94);
}

.task-list {
  list-style: none;
}

.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  border-radius: var(--radius);
  margin-bottom: 4px;
  transition: all var(--transition);
  background: transparent;
}

.task-item:hover {
  background: var(--glass);
}

.task-item.done {
  opacity: 0.35;
}

.task-item.done .task-text {
  text-decoration: line-through;
}

.task-check {
  width: 22px;
  height: 22px;
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  color: transparent;
  font-size: 11px;
  font-weight: 700;
}

.task-check:hover {
  border-color: rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.04);
}

.task-check:active {
  transform: scale(0.85);
}

.task-check.checked {
  background: rgba(255,255,255,0.12);
  border-color: transparent;
  color: var(--text-dim);
}

.task-text {
  flex: 1;
  font-size: 14px;
  line-height: 1.4;
  color: var(--text-secondary);
  transition: color var(--transition);
}

.task-delete {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all var(--transition);
  flex-shrink: 0;
}

.task-item:hover .task-delete {
  opacity: 0.6;
}

.task-delete:hover {
  background: rgba(231, 76, 60, 0.15);
  color: var(--pomodoro);
  opacity: 1;
}

.task-delete:active {
  transform: scale(0.88);
}

.empty-tasks {
  text-align: center;
  padding: 28px 20px;
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.6;
}

/* Stats bar */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px 24px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  margin-bottom: 20px;
}

.stat-item {
  text-align: center;
}

.stat-value {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text);
}

.stat-value .unit {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  margin-left: 2px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 600;
}

/* Settings modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  transition: opacity var(--transition);
}

.modal-overlay.show {
  display: flex;
  opacity: 1;
}

.modal {
  width: 100%;
  max-width: 520px;
  background: rgba(22, 22, 42, 0.95);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding: 8px 24px 32px;
  max-height: 85vh;
  max-height: 85dvh;
  overflow-y: auto;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  animation: modalSlideUp 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  box-shadow: 0 -8px 60px rgba(0, 0, 0, 0.5);
}

@keyframes modalSlideUp {
  from {
    transform: translateY(100%);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 16px 0;
  position: sticky;
  top: -8px;
  background: rgba(22, 22, 42, 0.95);
  z-index: 1;
}

.modal-header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: -24px;
  right: -24px;
  height: 1px;
  background: var(--border);
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.modal-close {
  width: 34px;
  height: 34px;
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  background: var(--glass);
  color: var(--text-dim);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}

.modal-close:hover {
  background: var(--card-hover);
  color: var(--text-secondary);
  border-color: var(--border-hover);
}

.modal-close:active {
  transform: scale(0.9);
}

.lang-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 20px;
}

.lang-toggle:hover {
  background: var(--card-hover);
  border-color: var(--border-hover);
  color: var(--text-secondary);
}

.lang-toggle:active {
  transform: scale(0.98);
}

.lang-flag {
  font-size: 18px;
}

.setting-group {
  margin-bottom: 24px;
  padding: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
}

.setting-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 12px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

.setting-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.setting-row:last-child {
  margin-bottom: 0;
}

.setting-row label {
  flex: 1;
  font-size: 14px;
  color: var(--text-secondary);
}

.setting-input {
  width: 72px;
  padding: 9px 12px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.2);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-display);
  text-align: center;
  outline: none;
  transition: all var(--transition);
}

.setting-input:focus {
  border-color: var(--border-hover);
  background: rgba(0,0,0,0.3);
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03);
}

.setting-unit {
  font-size: 12px;
  color: var(--text-dim);
  min-width: 20px;
}

/* Sound options */
.sound-options {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.sound-btn {
  padding: 9px 16px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
}

.sound-btn:hover {
  background: var(--glass);
  border-color: var(--border-hover);
  color: var(--text-secondary);
}

.sound-btn:active {
  transform: scale(0.95);
}

.sound-btn.active {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-sm);
}

/* Range slider */
.range-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.range-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  outline: none;
}

.range-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--text);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: transform var(--transition);
}

.range-row input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
}

.range-row input[type="range"]::-webkit-slider-thumb:active {
  transform: scale(1.05);
}

.range-value {
  font-size: 13px;
  color: var(--text-dim);
  min-width: 24px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Responsive */
@media (max-width: 400px) {
  .timer-ring { width: 230px; height: 230px; }
  .timer-time { font-size: 58px; }
  .start-btn { width: 168px; padding: 14px 0; font-size: 14px; }
  .modes { margin-bottom: 28px; }

  .stats-bar { gap: 28px; padding: 16px 20px; }

@media (min-width: 481px) {

  .task-item:hover .task-delete { opacity: 0.8; }
}

/* Scrollbar */

::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

::selection {
  background: rgba(231, 76, 60, 0.3);
  color: white;
}

</head>

        <button class="sound-btn" data-sound="beep" data-i18n="beep">📢 蜂鸣</button>

      </div>
    </div>
  </div>
</div>

<script>
// ========== i18n ==========
const i18n = {
  zh: {
    pomodoro: '番茄时间',
    shortBreak: '短休息',
    longBreak: '长休息',
    start: '开始',
    pause: '暂停',
    reset: '重置',
    readyToFocus: '准备好开始专注了吗？',
    tasks: '任务',
    taskPlaceholder: '今天要完成什么？',
    noTasks: '还没有任务，添加一个吧 ✏️',
    pomodoros: '个番茄',
    minutes: '分钟',
    today: '今天',
    totalFocus: '总专注',
    settings: '设置',
    timerSettings: '计时设置',
    pomodoroDuration: '番茄时长',
    shortBreakDuration: '短休息',
    longBreakDuration: '长休息',
    longBreakInterval: '长休息间隔',
    min: '分钟',
    pomodoros2: '个番茄',
    soundSettings: '声音设置',
    bell: '🔔 铃声',
    beep: '📢 蜂鸣',
    digital: '📱 电子',
    none: '🔇 无',
    volume: '音量',
    autoStartBreaks: '自动开始休息',
    autoStartBreakDesc: '番茄结束后自动开始休息',
    pomodoroComplete: '🍅 番茄时间结束！休息一下吧',
    breakComplete: '☕ 休息结束！开始下一个番茄吧',
    focusTime: '专注中...',
    breakTime: '休息中...',
    pomodoroFinished: '完成！',
    completed: 'completed',
  },
  en: {
    pomodoro: 'Pomodoro',
    shortBreak: 'Short Break',
    longBreak: 'Long Break',
    start: 'START',
    pause: 'PAUSE',
    reset: 'RESET',
    readyToFocus: 'Ready to focus?',
    tasks: 'Tasks',
    taskPlaceholder: 'What to do today?',
    noTasks: 'No tasks yet. Add one ✏️',
    pomodoros: '',
    minutes: 'min',
    today: 'Today',
    totalFocus: 'Total Focus',
    settings: 'Settings',
    timerSettings: 'Timer Settings',
    pomodoroDuration: 'Pomodoro',
    shortBreakDuration: 'Short Break',
    longBreakDuration: 'Long Break',
    longBreakInterval: 'Long Break After',
    min: 'min',
    pomodoros2: 'pomodoros',
    soundSettings: 'Sound Settings',
    bell: '🔔 Bell',
    beep: '📢 Beep',
    digital: '📱 Digital',
    none: '🔇 None',
    volume: 'Volume',
    autoStartBreaks: 'Auto Start Breaks',
    autoStartBreakDesc: 'Auto start break after pomodoro',
    pomodoroComplete: '🍅 Pomodoro complete! Take a break',
    breakComplete: '☕ Break over! Start your next pomodoro',
    focusTime: 'Focusing...',
    breakTime: 'On break...',
    pomodoroFinished: 'Done!',
    completed: 'completed',
  }
};

let lang = localStorage.getItem('ff-lang') || 'zh';

// Auto-detect language by IP (only on first visit)
if (!localStorage.getItem('ff-lang')) {
  fetch('https://ipapi.co/json/')
    .then(r => r.json())
    .then(d => {
      if (d.country !== 'CN') lang = 'en';
      localStorage.setItem('ff-lang', lang);
      applyLang();
    })
    .catch(() => {}); // fallback to zh
}

function t(key) { return i18n[lang][key] || key; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (i18n[lang][key]) el.placeholder = i18n[lang][key];
  });
  document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
  document.getElementById('currentLang').textContent = lang === 'zh' ? '🇨🇳' : '🇺🇸';
  document.getElementById('langText').textContent = lang === 'zh' ? '中文 / English' : 'English / 中文';
  localStorage.setItem('ff-lang', lang);
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  applyLang();
}

// ========== State ==========
const CIRCUMFERENCE = 2 * Math.PI * 135; // ~848

let config = JSON.parse(localStorage.getItem('ff-config') || 'null') || {
  pomodoro: 25,
  shortBreak: 5,
  longBreak: 15,
  interval: 4,
  sound: 'bell',
  volume: 70,
  autoBreak: true,
};

let state = {
  mode: 'pomodoro', // pomodoro | short-break | long-break
  running: false,
  timeLeft: config.pomodoro * 60,
  totalTime: config.pomodoro * 60,
  tasks: JSON.parse(localStorage.getItem('ff-tasks') || '[]'),
  pomodoroCount: parseInt(localStorage.getItem('ff-count-today') || '0'),
  totalMinutes: parseInt(localStorage.getItem('ff-total-min') || '0'),
  pomodorosSinceLastBreak: 0,
};

// Reset daily count
const today = new Date().toDateString();
const lastDate = localStorage.getItem('ff-count-date');
if (lastDate !== today) {
  state.pomodoroCount = 0;
  localStorage.setItem('ff-count-today', 0);
  localStorage.setItem('ff-count-date', today);
}

let interval = null;

// ========== DOM ==========
const $ = id => document.getElementById(id);
const progressCircle = $('progressCircle');
const timerDisplay = $('timerDisplay');
const timerLabel = $('timerLabel');
const startBtn = $('startBtn');
const resetBtn = $('resetBtn');
const taskInput = $('taskInput');
const taskList = $('taskList');
const emptyTasks = $('emptyTasks');
const settingsModal = $('settingsModal');

// ========== Timer ==========
function getModeSeconds() {
  if (state.mode === 'pomodoro') return config.pomodoro * 60;
  if (state.mode === 'short-break') return config.shortBreak * 60;
  return config.longBreak * 60;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
}

function updateDisplay() {
  timerDisplay.textContent = formatTime(state.timeLeft);
  const progress = 1 - (state.timeLeft / state.totalTime);
  const offset = CIRCUMFERENCE * (1 - progress);
  progressCircle.style.strokeDashoffset = offset;

  if (state.running) {
    timerLabel.textContent = state.mode === 'pomodoro' ? t('focusTime') : t('breakTime');
    startBtn.textContent = t('pause');
    startBtn.classList.add('running');
  } else if (state.timeLeft === state.totalTime) {
    timerLabel.textContent = t('readyToFocus');
    startBtn.textContent = t('start');
    startBtn.classList.remove('running');
  } else {
    timerLabel.textContent = t('pomodoroFinished');
    startBtn.textContent = t('start');
    startBtn.classList.remove('running');
  }
  document.title = formatTime(state.timeLeft) + ' - Focus Flow';
}

function switchMode(mode) {
  if (state.running) stop();
  state.mode = mode;
  state.totalTime = getModeSeconds();
  state.timeLeft = state.totalTime;

  document.body.className = mode;
  startBtn.className = 'start-btn ' + mode;

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  progressCircle.style.strokeDashoffset = 0;
  updateDisplay();
}

function start() {
  state.running = true;
  updateDisplay();
  interval = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      stop();
      onComplete();
    }
    updateDisplay();
  }, 1000);
}

function stop() {
  state.running = false;
  clearInterval(interval);
  interval = null;
  updateDisplay();
}

function resetTimer() {
  stop();
  state.timeLeft = state.totalTime;
  updateDisplay();
}

function onComplete() {
  playSound();
  if (state.mode === 'pomodoro') {
    state.pomodoroCount++;
    state.totalMinutes += config.pomodoro;
    state.pomodorosSinceLastBreak++;
    localStorage.setItem('ff-count-today', state.pomodoroCount);
    localStorage.setItem('ff-count-date', today);
    localStorage.setItem('ff-total-min', state.totalMinutes);
    updateStats();

    // Check if it's time for a long break
    if (state.pomodorosSinceLastBreak >= config.interval) {
      state.pomodorosSinceLastBreak = 0;
      if (config.autoBreak) switchMode('long-break');
    } else {
      if (config.autoBreak) switchMode('short-break');
    }
    if (!config.autoBreak) showNotification(t('pomodoroComplete'));
  } else {
    if (config.autoBreak) switchMode('pomodoro');
    else showNotification(t('breakComplete'));
  }
}

function showNotification(msg) {
  timerLabel.textContent = msg;
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Focus Flow 🍅', { body: msg });
  }
}

function updateStats() {
  const unit = lang === 'zh' ? t('pomodoros') : '';
  $('pomodoroCount').innerHTML = `${state.pomodoroCount}<span class="unit">${unit}</span>`;
  $('totalMinutes').innerHTML = `${state.totalMinutes}<span class="unit"> ${t('minutes')}</span>`;
}

// ========== Sound ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playSound() {
  if (config.sound === 'none') return;
  const ctx = getAudioCtx();
  const vol = config.volume / 100;
  const gain = ctx.createGain();
  gain.gain.value = vol;
  gain.connect(ctx.destination);

  if (config.sound === 'bell') {
    // Bell-like: multiple harmonics
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.value = vol * (1 - i * 0.2);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + 1.5);
    });
  } else if (config.sound === 'beep') {
    const osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 880;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.connect(gain);
    osc.start();
    osc.stop(ctx.currentTime + 0.8);
  } else if (config.sound === 'digital') {
    [800, 1000, 1200, 1000].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.value = vol * 0.5;
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2 + i * 0.2);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.2);
      osc.stop(ctx.currentTime + 0.2 + i * 0.2);
    });
  }
}

// ========== Tasks ==========
function renderTasks() {
  taskList.innerHTML = '';
  const done = state.tasks.filter(t => t.done).length;
  $('taskCount').textContent = state.tasks.length ? `${done}/${state.tasks.length} ${t('completed')}` : '';
  emptyTasks.style.display = state.tasks.length ? 'none' : 'block';

  state.tasks.forEach((task, i) => {
    const li = document.createElement('li');
    li.className = 'task-item' + (task.done ? ' done' : '');
    li.innerHTML = `
      <button class="task-check ${task.done ? 'checked' : ''}" data-i="${i}">${task.done ? '✓' : ''}</button>
      <span class="task-text">${escHtml(task.text)}</span>
      <button class="task-delete" data-i="${i}">✕</button>
    `;
    taskList.appendChild(li);
  });

  taskList.querySelectorAll('.task-check').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      state.tasks[i].done = !state.tasks[i].done;
      saveTasks();
      renderTasks();
    });
  });
  taskList.querySelectorAll('.task-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      state.tasks.splice(i, 1);
      saveTasks();
      renderTasks();
    });
  });
}

function addTask(text) {
  if (!text.trim()) return;
  state.tasks.unshift({ text: text.trim(), done: false });
  saveTasks();
  renderTasks();
  taskInput.value = '';
}

function saveTasks() {
  localStorage.setItem('ff-tasks', JSON.stringify(state.tasks));
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ========== Settings ==========
function openSettings() {
  $('setPomodoro').value = config.pomodoro;
  $('setShort').value = config.shortBreak;
  $('setLong').value = config.longBreak;
  $('setInterval').value = config.interval;
  $('volumeSlider').value = config.volume;
  $('volumeValue').textContent = config.volume;
  $('autoBreak').checked = config.autoBreak;

  document.querySelectorAll('.sound-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sound === config.sound);
  });

  settingsModal.classList.add('show');
}

function closeSettings() {
  config.pomodoro = Math.max(1, parseInt($('setPomodoro').value) || 25);
  config.shortBreak = Math.max(1, parseInt($('setShort').value) || 5);
  config.longBreak = Math.max(1, parseInt($('setLong').value) || 15);
  config.interval = Math.max(2, parseInt($('setInterval').value) || 4);
  config.volume = parseInt($('volumeSlider').value) || 70;
  config.autoBreak = $('autoBreak').checked;

  localStorage.setItem('ff-config', JSON.stringify(config));

  // Reset current timer with new config
  if (!state.running) {
    state.totalTime = getModeSeconds();
    state.timeLeft = state.totalTime;
    updateDisplay();
  }

  settingsModal.classList.remove('show');
}

// ========== Events ==========
startBtn.addEventListener('click', () => {
  if (state.running) stop();
  else start();
});

resetBtn.addEventListener('click', resetTimer);

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

$('addTaskBtn').addEventListener('click', () => addTask(taskInput.value));
taskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask(taskInput.value);
});

$('settingsBtn').addEventListener('click', openSettings);
$('closeModal').addEventListener('click', closeSettings);
settingsModal.addEventListener('click', e => {
  if (e.target === settingsModal) closeSettings();
});

$('langBtn').addEventListener('click', toggleLang);
$('langToggle').addEventListener('click', toggleLang);

document.querySelectorAll('.sound-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    config.sound = btn.dataset.sound;
    playSound(); // Preview
  });
});

$('volumeSlider').addEventListener('input', e => {
  $('volumeValue').textContent = e.target.value;
});

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// ========== PWA Service Worker ==========
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.warn('SW registration failed:', err));
}

// ========== Init ==========
progressCircle.style.strokeDasharray = CIRCUMFERENCE;
progressCircle.style.strokeDashoffset = 0;
