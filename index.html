<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Focus Flow - 番茄时钟</title>
<meta name="description" content="A simple bilingual Pomodoro timer / 简单双语番茄钟">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e74c3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus Flow">
<meta property="og:title" content="Focus Flow - Pomodoro Timer">
<meta property="og:description" content="Simple, beautiful Pomodoro timer in English & Chinese">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
<style>
:root {
  --pomodoro: #e74c3c;
  --pomodoro-bg: #3d1a1a;
  --short: #f39c12;
  --short-bg: #3d2e0a;
  --long: #3498db;
  --long-bg: #0a2a3d;
  --bg: #1a1a2e;
  --card: #16213e;
  --card-hover: #1a2745;
  --text: #e8e8e8;
  --text-dim: #888;
  --border: rgba(255,255,255,0.08);
  --radius: 16px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  transition: background var(--transition);
}
body.pomodoro { background: var(--pomodoro-bg); }
body.short-break { background: var(--short-bg); }
body.long-break { background: var(--long-bg); }

.container {
  width: 100%;
  max-width: 520px;
  padding: 20px 20px 100px;
}

/* Top bar */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.logo .emoji { font-size: 24px; }
.top-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: transparent;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }

/* Mode tabs */
.modes {
  display: flex;
  gap: 4px;
  background: rgba(0,0,0,0.2);
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 40px;
}
.mode-btn {
  flex: 1;
  padding: 12px 8px;
  border: none;
  border-radius: 11px;
  background: transparent;
  color: var(--text-dim);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.mode-btn.active {
  background: rgba(255,255,255,0.12);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.mode-btn.pomodoro.active { color: var(--pomodoro); }
.mode-btn.short-break.active { color: var(--short); }
.mode-btn.long-break.active { color: var(--long); }

/* Timer */
.timer-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
}
.timer-ring {
  position: relative;
  width: 280px;
  height: 280px;
  margin-bottom: 30px;
}
.timer-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.timer-ring .track {
  fill: none;
  stroke: rgba(255,255,255,0.06);
  stroke-width: 6;
}
.timer-ring .progress {
  fill: none;
  stroke: var(--pomodoro);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 848;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke var(--transition);
}
body.short-break .timer-ring .progress { stroke: var(--short); }
body.long-break .timer-ring .progress { stroke: var(--long); }

.timer-time {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 72px;
  font-weight: 200;
  letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
}
.timer-label {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 24px;
}

/* Start/Pause/Reset */
.timer-controls {
  display: flex;
  align-items: center;
  gap: 16px;
}
.start-btn {
  width: 200px;
  padding: 16px 0;
  border: none;
  border-radius: 50px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  color: white;
  letter-spacing: 2px;
}
.start-btn.pomodoro { background: var(--pomodoro); }
.start-btn.short-break { background: var(--short); }
.start-btn.long-break { background: var(--long); }
.start-btn:hover { opacity: 0.9; transform: scale(1.02); }
.start-btn:active { transform: scale(0.98); }
.start-btn.running { opacity: 0.85; }

.reset-btn {
  width: 50px; height: 50px;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  background: transparent;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.reset-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

/* Task section */
.task-section {
  margin-bottom: 24px;
}
.task-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.task-title {
  font-size: 17px;
  font-weight: 700;
}
.task-count {
  font-size: 13px;
  color: var(--text-dim);
}
.task-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.task-input {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(0,0,0,0.2);
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border var(--transition);
}
.task-input::placeholder { color: var(--text-dim); }
.task-input:focus { border-color: rgba(255,255,255,0.2); }
.task-add-btn {
  width: 48px; height: 48px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  color: var(--text);
  font-size: 24px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.task-add-btn:hover { background: rgba(255,255,255,0.15); }

.task-list { list-style: none; }
.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  transition: opacity var(--transition);
}
.task-item.done { opacity: 0.4; }
.task-item.done .task-text { text-decoration: line-through; }
.task-check {
  width: 22px; height: 22px;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  color: transparent;
  font-size: 12px;
}
.task-check.checked {
  background: rgba(255,255,255,0.15);
  border-color: transparent;
  color: var(--text-dim);
}
.task-text {
  flex: 1;
  font-size: 15px;
  line-height: 1.4;
}
.task-delete {
  width: 28px; height: 28px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: all var(--transition);
}
.task-item:hover .task-delete { opacity: 1; }
.task-delete:hover { background: rgba(255,255,255,0.08); }

.empty-tasks {
  text-align: center;
  padding: 30px;
  color: var(--text-dim);
  font-size: 14px;
}

/* Stats bar */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 20px;
  background: rgba(0,0,0,0.15);
  border-radius: var(--radius);
  margin-bottom: 24px;
}
.stat-item { text-align: center; }
.stat-value {
  font-size: 28px;
  font-weight: 700;
}
.stat-value .unit {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-dim);
  margin-left: 2px;
}
.stat-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Settings modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  border-radius: 24px 24px 0 0;
  padding: 24px;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.modal-title { font-size: 20px; font-weight: 700; }
.modal-close {
  width: 36px; height: 36px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.setting-group {
  margin-bottom: 24px;
}
.setting-label {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 10px;
  font-weight: 600;
}
.setting-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.setting-row label {
  flex: 1;
  font-size: 15px;
}
.setting-input {
  width: 80px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(0,0,0,0.2);
  color: var(--text);
  font-size: 15px;
  text-align: center;
  outline: none;
}
.setting-input:focus { border-color: rgba(255,255,255,0.2); }
.setting-unit {
  font-size: 14px;
  color: var(--text-dim);
  min-width: 20px;
}

/* Sound select */
.sound-options {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.sound-btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: transparent;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  transition: all var(--transition);
}
.sound-btn.active {
  background: rgba(255,255,255,0.1);
  color: var(--text);
  border-color: rgba(255,255,255,0.2);
}

/* Range slider */
.range-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.range-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.15);
  outline: none;
}
.range-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: white;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.range-value {
  font-size: 14px;
  color: var(--text-dim);
  min-width: 24px;
  text-align: right;
}

/* Lang toggle */
.lang-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: rgba(0,0,0,0.2);
  border-radius: 12px;
  font-size: 14px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 20px;
}
.lang-toggle:hover { background: rgba(0,0,0,0.3); }
.lang-flag {
  font-size: 18px;
}

/* Support section removed */

/* Responsive */
@media (max-width: 400px) {
  .timer-ring { width: 240px; height: 240px; }
  .timer-time { font-size: 60px; }
  .start-btn { width: 170px; padding: 14px 0; font-size: 16px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body class="pomodoro">

<div class="container">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo"><span class="emoji">🍅</span> Focus Flow</div>
    <div class="top-actions">
      <button class="icon-btn" id="langBtn" title="语言切换">🌐</button>
      <button class="icon-btn" id="settingsBtn" title="设置">⚙️</button>
    </div>
  </div>

  <!-- Mode Tabs -->
  <div class="modes">
    <button class="mode-btn pomodoro active" data-mode="pomodoro" data-i18n="pomodoro">番茄时间</button>
    <button class="mode-btn short-break" data-mode="short-break" data-i18n="shortBreak">短休息</button>
    <button class="mode-btn long-break" data-mode="long-break" data-i18n="longBreak">长休息</button>
  </div>

  <!-- Timer -->
  <div class="timer-section">
    <div class="timer-ring">
      <svg viewBox="0 0 280 280">
        <circle class="track" cx="140" cy="140" r="135"/>
        <circle class="progress" id="progressCircle" cx="140" cy="140" r="135"/>
      </svg>
      <div class="timer-time" id="timerDisplay">25:00</div>
    </div>
    <div class="timer-label" id="timerLabel" data-i18n="readyToFocus">准备好开始专注了吗？</div>
    <div class="timer-controls">
      <button class="start-btn pomodoro" id="startBtn" data-i18n="start">开始</button>
      <button class="reset-btn" id="resetBtn" title="重置">↺</button>
    </div>
  </div>

  <!-- Tasks -->
  <div class="task-section">
    <div class="task-header">
      <div class="task-title" data-i18n="tasks">任务</div>
      <div class="task-count" id="taskCount"></div>
    </div>
    <div class="task-input-row">
      <input class="task-input" id="taskInput" data-i18n-placeholder="taskPlaceholder" placeholder="今天要完成什么？">
      <button class="task-add-btn" id="addTaskBtn">+</button>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <div class="empty-tasks" id="emptyTasks" data-i18n="noTasks">还没有任务，添加一个吧 ✏️</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-value" id="pomodoroCount">0<span class="unit" data-i18n="pomodoros">个番茄</span></div>
      <div class="stat-label" data-i18n="today">今天</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="totalMinutes">0<span class="unit" data-i18n="minutes">分钟</span></div>
      <div class="stat-label" data-i18n="totalFocus">总专注</div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" data-i18n="settings">设置</div>
      <button class="modal-close" id="closeModal">✕</button>
    </div>

    <div class="lang-toggle" id="langToggle">
      <span class="lang-flag" id="currentLang">🇨🇳</span>
      <span id="langText">中文 / English</span>
    </div>

    <div class="setting-group">
      <div class="setting-label" data-i18n="timerSettings">计时设置</div>
      <div class="setting-row">
        <label data-i18n="pomodoroDuration">番茄时长</label>
        <input class="setting-input" type="number" id="setPomodoro" min="1" max="120" value="25">
        <span class="setting-unit" data-i18n="min">分钟</span>
      </div>
      <div class="setting-row">
        <label data-i18n="shortBreakDuration">短休息</label>
        <input class="setting-input" type="number" id="setShort" min="1" max="60" value="5">
        <span class="setting-unit" data-i18n="min">分钟</span>
      </div>
      <div class="setting-row">
        <label data-i18n="longBreakDuration">长休息</label>
        <input class="setting-input" type="number" id="setLong" min="1" max="60" value="15">
        <span class="setting-unit" data-i18n="min">分钟</span>
      </div>
      <div class="setting-row">
        <label data-i18n="longBreakInterval">长休息间隔</label>
        <input class="setting-input" type="number" id="setInterval" min="2" max="10" value="4">
        <span class="setting-unit" data-i18n="pomodoros2">个番茄</span>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label" data-i18n="soundSettings">声音设置</div>
      <div class="sound-options">
        <button class="sound-btn active" data-sound="bell" data-i18n="bell">🔔 铃声</button>
        <button class="sound-btn" data-sound="beep" data-i18n="beep">📢 蜂鸣</button>
        <button class="sound-btn" data-sound="digital" data-i18n="digital">📱 电子</button>
        <button class="sound-btn" data-sound="none" data-i18n="none">🔇 无</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label" data-i18n="volume">音量</div>
      <div class="range-row">
        <span>🔈</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="70">
        <span>🔊</span>
        <span class="range-value" id="volumeValue">70</span>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label" data-i18n="autoStartBreaks">自动开始休息</div>
      <div class="setting-row">
        <label data-i18n="autoStartBreakDesc">番茄结束后自动开始休息</label>
        <input class="setting-input" type="checkbox" id="autoBreak" checked style="width:20px;height:20px;accent-color:var(--pomodoro);">
      </div>
    </div>
  </div>
</div>

<script>
// ========== i18n ==========
const i18n = {
  zh: {
    pomodoro: '番茄时间',
    shortBreak: '短休息',
    longBreak: '长休息',
    start: '开始',
    pause: '暂停',
    reset: '重置',
    readyToFocus: '准备好开始专注了吗？',
    tasks: '任务',
    taskPlaceholder: '今天要完成什么？',
    noTasks: '还没有任务，添加一个吧 ✏️',
    pomodoros: '个番茄',
    minutes: '分钟',
    today: '今天',
    totalFocus: '总专注',
    settings: '设置',
    timerSettings: '计时设置',
    pomodoroDuration: '番茄时长',
    shortBreakDuration: '短休息',
    longBreakDuration: '长休息',
    longBreakInterval: '长休息间隔',
    min: '分钟',
    pomodoros2: '个番茄',
    soundSettings: '声音设置',
    bell: '🔔 铃声',
    beep: '📢 蜂鸣',
    digital: '📱 电子',
    none: '🔇 无',
    volume: '音量',
    autoStartBreaks: '自动开始休息',
    autoStartBreakDesc: '番茄结束后自动开始休息',
    pomodoroComplete: '🍅 番茄时间结束！休息一下吧',
    breakComplete: '☕ 休息结束！开始下一个番茄吧',
    focusTime: '专注中...',
    breakTime: '休息中...',
    pomodoroFinished: '完成！',
    completed: 'completed',
  },
  en: {
    pomodoro: 'Pomodoro',
    shortBreak: 'Short Break',
    longBreak: 'Long Break',
    start: 'START',
    pause: 'PAUSE',
    reset: 'RESET',
    readyToFocus: 'Ready to focus?',
    tasks: 'Tasks',
    taskPlaceholder: 'What to do today?',
    noTasks: 'No tasks yet. Add one ✏️',
    pomodoros: '',
    minutes: 'min',
    today: 'Today',
    totalFocus: 'Total Focus',
    settings: 'Settings',
    timerSettings: 'Timer Settings',
    pomodoroDuration: 'Pomodoro',
    shortBreakDuration: 'Short Break',
    longBreakDuration: 'Long Break',
    longBreakInterval: 'Long Break After',
    min: 'min',
    pomodoros2: 'pomodoros',
    soundSettings: 'Sound Settings',
    bell: '🔔 Bell',
    beep: '📢 Beep',
    digital: '📱 Digital',
    none: '🔇 None',
    volume: 'Volume',
    autoStartBreaks: 'Auto Start Breaks',
    autoStartBreakDesc: 'Auto start break after pomodoro',
    pomodoroComplete: '🍅 Pomodoro complete! Take a break',
    breakComplete: '☕ Break over! Start your next pomodoro',
    focusTime: 'Focusing...',
    breakTime: 'On break...',
    pomodoroFinished: 'Done!',
    completed: 'completed',
  }
};

let lang = localStorage.getItem('ff-lang') || 'zh';

// Auto-detect language by IP (only on first visit)
if (!localStorage.getItem('ff-lang')) {
  fetch('https://ipapi.co/json/')
    .then(r => r.json())
    .then(d => {
      if (d.country !== 'CN') lang = 'en';
      localStorage.setItem('ff-lang', lang);
      applyLang();
    })
    .catch(() => {}); // fallback to zh
}

function t(key) { return i18n[lang][key] || key; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (i18n[lang][key]) el.placeholder = i18n[lang][key];
  });
  document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
  document.getElementById('currentLang').textContent = lang === 'zh' ? '🇨🇳' : '🇺🇸';
  document.getElementById('langText').textContent = lang === 'zh' ? '中文 / English' : 'English / 中文';
  localStorage.setItem('ff-lang', lang);
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  applyLang();
}

// ========== State ==========
const CIRCUMFERENCE = 2 * Math.PI * 135; // ~848

let config = JSON.parse(localStorage.getItem('ff-config') || 'null') || {
  pomodoro: 25,
  shortBreak: 5,
  longBreak: 15,
  interval: 4,
  sound: 'bell',
  volume: 70,
  autoBreak: true,
};

let state = {
  mode: 'pomodoro', // pomodoro | short-break | long-break
  running: false,
  timeLeft: config.pomodoro * 60,
  totalTime: config.pomodoro * 60,
  tasks: JSON.parse(localStorage.getItem('ff-tasks') || '[]'),
  pomodoroCount: parseInt(localStorage.getItem('ff-count-today') || '0'),
  totalMinutes: parseInt(localStorage.getItem('ff-total-min') || '0'),
  pomodorosSinceLastBreak: 0,
};

// Reset daily count
const today = new Date().toDateString();
const lastDate = localStorage.getItem('ff-count-date');
if (lastDate !== today) {
  state.pomodoroCount = 0;
  localStorage.setItem('ff-count-today', 0);
  localStorage.setItem('ff-count-date', today);
}

let interval = null;

// ========== DOM ==========
const $ = id => document.getElementById(id);
const progressCircle = $('progressCircle');
const timerDisplay = $('timerDisplay');
const timerLabel = $('timerLabel');
const startBtn = $('startBtn');
const resetBtn = $('resetBtn');
const taskInput = $('taskInput');
const taskList = $('taskList');
const emptyTasks = $('emptyTasks');
const settingsModal = $('settingsModal');

// ========== Timer ==========
function getModeSeconds() {
  if (state.mode === 'pomodoro') return config.pomodoro * 60;
  if (state.mode === 'short-break') return config.shortBreak * 60;
  return config.longBreak * 60;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
}

function updateDisplay() {
  timerDisplay.textContent = formatTime(state.timeLeft);
  const progress = 1 - (state.timeLeft / state.totalTime);
  const offset = CIRCUMFERENCE * (1 - progress);
  progressCircle.style.strokeDashoffset = offset;

  if (state.running) {
    timerLabel.textContent = state.mode === 'pomodoro' ? t('focusTime') : t('breakTime');
    startBtn.textContent = t('pause');
    startBtn.classList.add('running');
  } else if (state.timeLeft === state.totalTime) {
    timerLabel.textContent = t('readyToFocus');
    startBtn.textContent = t('start');
    startBtn.classList.remove('running');
  } else {
    timerLabel.textContent = t('pomodoroFinished');
    startBtn.textContent = t('start');
    startBtn.classList.remove('running');
  }
  document.title = formatTime(state.timeLeft) + ' - Focus Flow';
}

function switchMode(mode) {
  if (state.running) stop();
  state.mode = mode;
  state.totalTime = getModeSeconds();
  state.timeLeft = state.totalTime;

  document.body.className = mode;
  startBtn.className = 'start-btn ' + mode;

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  progressCircle.style.strokeDashoffset = 0;
  updateDisplay();
}

function start() {
  state.running = true;
  updateDisplay();
  interval = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      stop();
      onComplete();
    }
    updateDisplay();
  }, 1000);
}

function stop() {
  state.running = false;
  clearInterval(interval);
  interval = null;
  updateDisplay();
}

function resetTimer() {
  stop();
  state.timeLeft = state.totalTime;
  updateDisplay();
}

function onComplete() {
  playSound();
  if (state.mode === 'pomodoro') {
    state.pomodoroCount++;
    state.totalMinutes += config.pomodoro;
    state.pomodorosSinceLastBreak++;
    localStorage.setItem('ff-count-today', state.pomodoroCount);
    localStorage.setItem('ff-count-date', today);
    localStorage.setItem('ff-total-min', state.totalMinutes);
    updateStats();

    // Check if it's time for a long break
    if (state.pomodorosSinceLastBreak >= config.interval) {
      state.pomodorosSinceLastBreak = 0;
      if (config.autoBreak) switchMode('long-break');
    } else {
      if (config.autoBreak) switchMode('short-break');
    }
    if (!config.autoBreak) showNotification(t('pomodoroComplete'));
  } else {
    if (config.autoBreak) switchMode('pomodoro');
    else showNotification(t('breakComplete'));
  }
}

function showNotification(msg) {
  timerLabel.textContent = msg;
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Focus Flow 🍅', { body: msg });
  }
}

function updateStats() {
  const unit = lang === 'zh' ? t('pomodoros') : '';
  $('pomodoroCount').innerHTML = `${state.pomodoroCount}<span class="unit">${unit}</span>`;
  $('totalMinutes').innerHTML = `${state.totalMinutes}<span class="unit"> ${t('minutes')}</span>`;
}

// ========== Sound ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playSound() {
  if (config.sound === 'none') return;
  const ctx = getAudioCtx();
  const vol = config.volume / 100;
  const gain = ctx.createGain();
  gain.gain.value = vol;
  gain.connect(ctx.destination);

  if (config.sound === 'bell') {
    // Bell-like: multiple harmonics
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.value = vol * (1 - i * 0.2);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + 1.5);
    });
  } else if (config.sound === 'beep') {
    const osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 880;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.connect(gain);
    osc.start();
    osc.stop(ctx.currentTime + 0.8);
  } else if (config.sound === 'digital') {
    [800, 1000, 1200, 1000].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.value = vol * 0.5;
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2 + i * 0.2);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.2);
      osc.stop(ctx.currentTime + 0.2 + i * 0.2);
    });
  }
}

// ========== Tasks ==========
function renderTasks() {
  taskList.innerHTML = '';
  const done = state.tasks.filter(t => t.done).length;
  $('taskCount').textContent = state.tasks.length ? `${done}/${state.tasks.length} ${t('completed')}` : '';
  emptyTasks.style.display = state.tasks.length ? 'none' : 'block';

  state.tasks.forEach((task, i) => {
    const li = document.createElement('li');
    li.className = 'task-item' + (task.done ? ' done' : '');
    li.innerHTML = `
      <button class="task-check ${task.done ? 'checked' : ''}" data-i="${i}">${task.done ? '✓' : ''}</button>
      <span class="task-text">${escHtml(task.text)}</span>
      <button class="task-delete" data-i="${i}">✕</button>
    `;
    taskList.appendChild(li);
  });

  taskList.querySelectorAll('.task-check').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      state.tasks[i].done = !state.tasks[i].done;
      saveTasks();
      renderTasks();
    });
  });
  taskList.querySelectorAll('.task-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      state.tasks.splice(i, 1);
      saveTasks();
      renderTasks();
    });
  });
}

function addTask(text) {
  if (!text.trim()) return;
  state.tasks.unshift({ text: text.trim(), done: false });
  saveTasks();
  renderTasks();
  taskInput.value = '';
}

function saveTasks() {
  localStorage.setItem('ff-tasks', JSON.stringify(state.tasks));
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ========== Settings ==========
function openSettings() {
  $('setPomodoro').value = config.pomodoro;
  $('setShort').value = config.shortBreak;
  $('setLong').value = config.longBreak;
  $('setInterval').value = config.interval;
  $('volumeSlider').value = config.volume;
  $('volumeValue').textContent = config.volume;
  $('autoBreak').checked = config.autoBreak;

  document.querySelectorAll('.sound-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sound === config.sound);
  });

  settingsModal.classList.add('show');
}

function closeSettings() {
  config.pomodoro = Math.max(1, parseInt($('setPomodoro').value) || 25);
  config.shortBreak = Math.max(1, parseInt($('setShort').value) || 5);
  config.longBreak = Math.max(1, parseInt($('setLong').value) || 15);
  config.interval = Math.max(2, parseInt($('setInterval').value) || 4);
  config.volume = parseInt($('volumeSlider').value) || 70;
  config.autoBreak = $('autoBreak').checked;

  localStorage.setItem('ff-config', JSON.stringify(config));

  // Reset current timer with new config
  if (!state.running) {
    state.totalTime = getModeSeconds();
    state.timeLeft = state.totalTime;
    updateDisplay();
  }

  settingsModal.classList.remove('show');
}

// ========== Events ==========
startBtn.addEventListener('click', () => {
  if (state.running) stop();
  else start();
});

resetBtn.addEventListener('click', resetTimer);

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

$('addTaskBtn').addEventListener('click', () => addTask(taskInput.value));
taskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask(taskInput.value);
});

$('settingsBtn').addEventListener('click', openSettings);
$('closeModal').addEventListener('click', closeSettings);
settingsModal.addEventListener('click', e => {
  if (e.target === settingsModal) closeSettings();
});

$('langBtn').addEventListener('click', toggleLang);
$('langToggle').addEventListener('click', toggleLang);

document.querySelectorAll('.sound-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    config.sound = btn.dataset.sound;
    playSound(); // Preview
  });
});

$('volumeSlider').addEventListener('input', e => {
  $('volumeValue').textContent = e.target.value;
});

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// ========== PWA Service Worker ==========
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.warn('SW registration failed:', err));
}

// ========== Init ==========
progressCircle.style.strokeDasharray = CIRCUMFERENCE;
progressCircle.style.strokeDashoffset = 0;
applyLang();
updateStats();
renderTasks();
updateDisplay();
</script>
